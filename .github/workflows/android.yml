name: Build DiagramQA APK

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Grant execute permission for Gradle wrappers
        run: chmod +x ./gradlew ./android/gradlew || true

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (no signing)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -x lintVitalRelease || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DiagramQA-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: DiagramQA-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
